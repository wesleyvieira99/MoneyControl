<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MoneyControl Loading</title>
  <style>
    :root {
      --bg0: #020617;
      --bg1: #0f172a;
      --c1: #22d3ee;
      --c2: #f59e0b;
      --c3: #34d399;
      --txt: #e2e8f0;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--txt);
      background:
        radial-gradient(circle at 15% 20%, rgba(34,211,238,0.18), transparent 30%),
        radial-gradient(circle at 82% 76%, rgba(245,158,11,0.15), transparent 36%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
    }

    .card {
      width: min(560px, calc(100vw - 40px));
      padding: 34px 38px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(15,23,42,0.75), rgba(3,7,18,0.82));
      border: 1px solid rgba(148,163,184,0.2);
      box-shadow: 0 30px 80px rgba(2,6,23,0.45);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -80px auto auto -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(34,211,238,0.24), transparent 70%);
      filter: blur(6px);
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 32px;
      background: linear-gradient(140deg, var(--c1), var(--c3));
      color: #052e2b;
      box-shadow: 0 12px 26px rgba(45,212,191,0.35);
      animation: float 2.6s ease-in-out infinite;
    }

    h1 {
      margin: 14px 0 6px;
      font-size: 30px;
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .bar {
      height: 9px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(148,163,184,0.2);
      overflow: hidden;
      border: 1px solid rgba(148,163,184,0.2);
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3));
      animation: load 2.2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(34,211,238,0.45);
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #cbd5e1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @keyframes load {
      0% { width: 0; transform: translateX(-2%); }
      65% { width: 82%; transform: translateX(0); }
      100% { width: 100%; transform: translateX(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="logo">M</div>
    <h1>MoneyControl</h1>
    <p>Inicializando os módulos financeiros, sincronizando dados e preparando sua central de controle.</p>
    <div class="bar"><span></span></div>
    <div class="hint">Iniciando aplicação desktop</div>
  </section>
</body>
</html>
